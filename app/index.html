<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hermes Agent GUI</title>
    <link rel="stylesheet" href="node_modules/xterm/css/xterm.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Hermes Agent</h1>
            <div id="header-right">
                <span id="status">Starting...</span>
                <button type="button" id="export-btn" class="control-btn">Export Log</button>
            </div>
        </header>
        <main id="terminal-container">
            <div id="terminal"></div>
        </main>
        <footer>
            <div class="task-controls">
                <button type="button" id="decompose-btn" class="control-btn">Decompose Task</button>
                <input type="text" id="decompose-input" placeholder="Describe task to decompose..." autocomplete="off">
            </div>
        </footer>
    </div>
    <script src="node_modules/xterm/lib/xterm.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
